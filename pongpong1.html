<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HiddenGems Bohol</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: black;
}

/* HEADER */
.header {
    background: #e6e6e6;
    padding: 22px 45px;
    border-top: 4px solid #2c6fb7;
    border-bottom: 4px solid #2c6fb7;
}

.header h1 {
    color: #0b7a2f;
    font-size: 20px;
    font-weight: bold;
}

.header span {
    display: block;
    color: #0b7a2f;
    font-size: 17px;
    letter-spacing: 2px;
}

/* MAIN */
.main {
    position: relative;
    height: calc(100vh - 115px);
    overflow: hidden;
}

/* BACKGROUND IMAGE */
.bg-img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    top: 0;
    left: 0;
    z-index: 0;
}

/* GREEN OVERLAY */
.main::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(rgba(0,90,40,0.35), rgba(0,0,0,0.45));
    top: 0;
    left: 0;
    z-index: 1;
}

/* CONTENT */
.content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* TITLE */
.title {
    font-size: 46px;
    font-weight: 800;
    margin-bottom: 25px;
}

.white {
    color: #ffffff;
}

.green {
    color: #0b7a2f;
}

/* TEXT */
.login-text {
    color: #f0f0f0;
    margin-bottom: 10px;
    font-size: 14px;
}

/* SOCIALS */
.socials {
    display: flex;
    gap: 18px;
    margin-bottom: 25px;
}

.social-btn {
    width: 55px;
    height: 55px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.25s;
}

/* FACEBOOK */
.fb {
    background: #1877f2;
}

.fb img {
    width: 26px;
    height: 26px;
}

/* GOOGLE */
.google {
    background: #f1f1f1;
}

.google img {
    width: 26px;
    height: 26px;
}

/* HOVER EFFECT */
.social-btn:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.35);
}

/* INPUTS */
.input {
    width: 280px;
    padding: 12px;
    margin: 9px 0;
    border-radius: 25px;
    border: none;
    outline: none;
    text-align: center;
    font-size: 15px;
    background: #eaeaea;
}

.input:focus {
    box-shadow: 0 0 8px #0b7a2f;
}

/* BUTTON */
.login-btn {
    margin-top: 18px;
    padding: 13px 45px;
    background: #0b7a2f;
    color: white;
    border: none;
    border-radius: 28px;
    font-size: 15px;
    cursor: pointer;
    transition: 0.25s;
}

.login-btn:hover {
    background: #0e8f37;
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

/* FOOTER */
.footer {
    background: black;
    color: white;
    text-align: center;
    padding: 18px;
    font-size: 12px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h1>HiddenGems</h1>
    <span>BOHOL</span>
</div>

<!-- MAIN -->
<div class="main">

    <!-- BACKGROUND (Chocolate Hills) -->
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/28/Chocolate_Hills_overview.JPG/1280px-Chocolate_Hills_overview.JPG" class="bg-img">

    <!-- CONTENT -->
    <div class="content">

        <div class="title">
            <span class="white">Welc</span><span class="green">ome!</span>
        </div>

        <div class="login-text">Log-in using:</div>

        <div class="socials">

            <!-- FACEBOOK -->
            <div class="social-btn fb" onclick="socialClick('Facebook')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg">
            </div>

            <!-- GOOGLE -->
            <div class="social-btn google" onclick="socialClick('Google')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg">
            </div>

        </div>

        <input class="input" placeholder="Username">
        <input class="input" placeholder="Email">
        <input class="input" type="password" placeholder="Password">

        <button class="login-btn" onclick="login()">Log-in</button>

    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 HiddenGemsBHL LLC All rights reserved.
</div>

<script>
function login() {
    alert("Logging in...");
}

function socialClick(platform) {
    alert("Login with " + platform);
}
</script>

</body>
</html>
